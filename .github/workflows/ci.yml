name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libcurl4-openssl-dev
      - name: Format
        run: cargo fmt --all -- --check
      - name: Check
        run: cargo check --locked --workspace --all-targets --all-features
      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --locked --workspace --all-features
      - name: Documentation tests
        run: cargo test --locked --doc --workspace

  repository:
    name: Repository validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -r scripts/requirements.txt
      - run: python scripts/validate-repo.py
      - name: Shell syntax
        run: find scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

  container:
    name: Container build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: kafka-edge-router:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
