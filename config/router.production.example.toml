[server]
security_mode = "protected_proxy"
http_addr = "127.0.0.1:8080"
grpc_addr = "127.0.0.1:9090"
shutdown_grace_secs = 30

[api]
http_body_limit_bytes = 1048576
stream_queue_capacity = 512
max_stream_queue_capacity = 8192
sse_keep_alive_secs = 15
ws_max_message_bytes = 65536
ws_max_frame_bytes = 65536
ws_max_commands_per_second = 32
grpc_max_decoding_message_bytes = 4194304
grpc_max_encoding_message_bytes = 4194304
grpc_concurrency_limit = 256
grpc_keep_alive_interval_secs = 30
grpc_keep_alive_timeout_secs = 10
grpc_health_enabled = true
grpc_reflection_enabled = false
publish_max_payload_bytes = 1048576
max_rate_limit_principals = 10000
global_commands_per_second = 10000
principal_commands_per_second = 64
global_publishes_per_second = 1000
principal_publishes_per_second = 32

[router]
default_queue_capacity = 512
max_queue_capacity = 8192
max_connections = 10000
max_connections_per_tenant = 1000
max_subscriptions = 100000
max_subscriptions_per_tenant = 10000
max_subscriptions_per_connection = 256
slow_consumer_strikes = 3

# Replace opaque values through a secret-mounted file or environment overlay.
[auth]
mode = "static_bearer"
tenant_header = "x-tenant-id"
bearer_tokens = { "REPLACE_TOKEN_TENANT_A" = "tenant-a", "REPLACE_TOKEN_TENANT_B" = "tenant-b" }
publish_tenants = ["tenant-a", "tenant-b"]

[kafka.consumer]
brokers = "kafka-0.kafka:9092,kafka-1.kafka:9092,kafka-2.kafka:9092"
# Replace this with a stable unique node identity. Kubernetes uses POD_UID through
# deploy/kubernetes/router.toml.example instead.
group_id = "kafka-edge-router-REPLACE_NODE_ID"
client_id = "kafka-edge-router"
topics = ["router.input"]
auto_offset_reset = "latest"
max_payload_bytes = 1048576
commit_invalid_messages = true

[kafka.consumer.properties]
"security.protocol" = "SASL_SSL"
"sasl.mechanism" = "SCRAM-SHA-512"
"sasl.username" = "REPLACE"
"sasl.password" = "REPLACE"
"enable.partition.eof" = "false"

[kafka.producer]
enabled = true
brokers = "kafka-0.kafka:9092,kafka-1.kafka:9092,kafka-2.kafka:9092"
client_id = "kafka-edge-router-producer"
topic = "router.input"
delivery_timeout_ms = 10000

[kafka.producer.properties]
"security.protocol" = "SASL_SSL"
"sasl.mechanism" = "SCRAM-SHA-512"
"sasl.username" = "REPLACE"
"sasl.password" = "REPLACE"
"compression.type" = "lz4"
"linger.ms" = "2"

[webhooks]
enabled = true
mode = "durable"

[webhooks.durable]
brokers = "kafka-0.kafka:9092,kafka-1.kafka:9092,kafka-2.kafka:9092"
client_id = "kafka-edge-router-webhook"
group_id = "kafka-edge-router-webhook"
delivery_topic = "router.webhook.delivery"
retry_topic = "router.webhook.retry"
dead_letter_topic = "router.webhook.dead-letter"
delivery_timeout_ms = 10000
max_record_bytes = 2097152
max_recovery_records = 10000

[webhooks.durable.properties]
"security.protocol" = "SASL_SSL"
"sasl.mechanism" = "SCRAM-SHA-512"
"sasl.username" = "REPLACE"
"sasl.password" = "REPLACE"

[[webhooks.destinations]]
id = "tenant-a-news"
url = "https://events.example.com/router"
queue_capacity = 1024
timeout_ms = 5000
max_attempts = 5
initial_backoff_ms = 250
max_backoff_ms = 30000
signing_secret = "REPLACE_WEBHOOK_SECRET"
allowed_hosts = ["events.example.com"]
allowed_ports = [443]
allow_private_ips = false
allow_http = false
headers = { "x-environment" = "production" }

[webhooks.destinations.filter]
tenant_id = "tenant-a"
kind = "content"
channel = "news"

[logging]
filter = "routerd=info,router_core=info,router_kafka=info,router_api=info,router_webhook=info"
json = true

[observability.opentelemetry]
enabled = true
endpoint = "http://otel-collector:4318"
service_name = "kafka-edge-router"
timeout_ms = 5000
shutdown_timeout_ms = 5000
sampling_ratio = 0.1

[observability.kafka_readiness]
enabled = true
check_interval_ms = 1000
stale_after_secs = 30
failure_threshold = 3
success_threshold = 2
