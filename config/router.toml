[server]
security_mode = "development"
http_addr = "0.0.0.0:8080"
grpc_addr = "0.0.0.0:9090"
shutdown_grace_secs = 10

[api]
http_body_limit_bytes = 1048576
stream_queue_capacity = 256
max_stream_queue_capacity = 4096
sse_keep_alive_secs = 15
ws_max_message_bytes = 65536
ws_max_frame_bytes = 65536
ws_max_commands_per_second = 32
grpc_max_decoding_message_bytes = 4194304
grpc_max_encoding_message_bytes = 4194304
grpc_concurrency_limit = 256
grpc_keep_alive_interval_secs = 30
grpc_keep_alive_timeout_secs = 10
grpc_health_enabled = true
grpc_reflection_enabled = true
publish_max_payload_bytes = 1048576
max_rate_limit_principals = 10000
global_commands_per_second = 10000
principal_commands_per_second = 64
global_publishes_per_second = 1000
principal_publishes_per_second = 32

[router]
default_queue_capacity = 256
max_queue_capacity = 4096
max_connections = 10000
max_connections_per_tenant = 1000
max_subscriptions = 100000
max_subscriptions_per_tenant = 10000
max_subscriptions_per_connection = 128
slow_consumer_strikes = 3

# Development-only mode. Production should use static_bearer or trusted_header.
[auth]
mode = "disabled"
default_tenant = "tenant-demo"
tenant_header = "x-tenant-id"
bearer_tokens = {}
publish_tenants = ["tenant-demo"]

[kafka.consumer]
brokers = "localhost:9092"
group_id = "kafka-edge-router-local"
client_id = "kafka-edge-router-consumer"
topics = ["router.input"]
auto_offset_reset = "earliest"
max_payload_bytes = 1048576
commit_invalid_messages = true

[kafka.consumer.properties]
"session.timeout.ms" = "45000"
"heartbeat.interval.ms" = "3000"

[kafka.producer]
enabled = true
brokers = "localhost:9092"
client_id = "kafka-edge-router-producer"
topic = "router.input"
delivery_timeout_ms = 10000

[kafka.producer.properties]
"compression.type" = "lz4"
"linger.ms" = "2"

[webhooks]
enabled = false
mode = "volatile"
destinations = []

[logging]
filter = "routerd=info,router_core=debug,router_kafka=info,router_api=info,router_webhook=info"
json = false

[observability.opentelemetry]
enabled = false
endpoint = "http://127.0.0.1:4318"
service_name = "kafka-edge-router"
timeout_ms = 5000
shutdown_timeout_ms = 5000
sampling_ratio = 0.1

[observability.kafka_readiness]
enabled = false
check_interval_ms = 1000
stale_after_secs = 30
failure_threshold = 3
success_threshold = 2
