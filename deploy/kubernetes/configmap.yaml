apiVersion: v1
kind: ConfigMap
metadata:
  name: rust-kafka-edge-router
  namespace: kafka-router
data:
  router.toml: |
    [server]
    http_addr = "0.0.0.0:8080"
    grpc_addr = "0.0.0.0:9090"
    shutdown_grace_secs = 25

    [api]
    http_body_limit_bytes = 1048576
    stream_queue_capacity = 512
    max_stream_queue_capacity = 8192
    sse_keep_alive_secs = 15

    [router]
    default_queue_capacity = 512
    max_queue_capacity = 8192
    max_subscriptions_per_connection = 256
    slow_consumer_strikes = 3

    # This assumes an authenticated ingress strips and injects x-tenant-id.
    [auth]
    mode = "trusted_header"
    tenant_header = "x-tenant-id"

    [kafka.consumer]
    brokers = "kafka.kafka.svc.cluster.local:9092"
    group_id = "overridden-by-pod-environment"
    client_id = "rust-kafka-edge-router"
    topics = ["router.input"]
    auto_offset_reset = "latest"
    max_payload_bytes = 1048576
    commit_invalid_messages = true

    [kafka.producer]
    enabled = true
    brokers = "kafka.kafka.svc.cluster.local:9092"
    client_id = "rust-kafka-edge-router-producer"
    topic = "router.input"
    delivery_timeout_ms = 10000

    [webhooks]
    enabled = false
    destinations = []

    [logging]
    filter = "routerd=info,router_core=info,router_kafka=info,router_api=info,router_webhook=info"
    json = true
