apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-edge-router
  namespace: kafka-router
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kafka-edge-router
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
  egress:
    # Replace broad examples with cluster-specific Kafka, DNS, telemetry, and
    # allowlisted webhook destinations.
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 9092
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 443
