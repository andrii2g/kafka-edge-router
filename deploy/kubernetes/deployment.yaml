apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-edge-router
  namespace: kafka-router
  labels:
    app.kubernetes.io/name: kafka-edge-router
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka-edge-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka-edge-router
    spec:
      terminationGracePeriodSeconds: 35
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: router
          image: ghcr.io/andrii2g/kafka-edge-router:0.1.0
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/router/router.toml"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Unique group per pod implements ADR 0001 full-stream consumption.
            - name: ROUTER__KAFKA__CONSUMER__GROUP_ID
              value: "router-$(POD_NAME)"
            - name: RUST_LOG
              value: "routerd=info,router_core=info,router_kafka=info,router_api=info,router_webhook=info"
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 2
            failureThreshold: 30
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/router
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: kafka-edge-router
        - name: tmp
          emptyDir: {}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: kafka-edge-router
