apiVersion: v1
kind: Service
metadata:
  name: rust-kafka-edge-router
  namespace: kafka-router
  labels:
    app.kubernetes.io/name: rust-kafka-edge-router
spec:
  selector:
    app.kubernetes.io/name: rust-kafka-edge-router
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 9090
      targetPort: grpc
